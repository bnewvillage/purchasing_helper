<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demand Dashboard — Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
      padding: 14px 16px;
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 { font-size: 15px; font-weight: 500; }
    header span { font-size: 11px; color: #888; }
    .demo-badge {
      font-size: 10px;
      font-weight: 500;
      background: #FFF3CD;
      color: #856404;
      padding: 2px 8px;
      border-radius: 4px;
      border: 0.5px solid #FFDA6A;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 16px; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .metric {
      background: #fff;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.08);
      padding: 12px 14px;
    }

    .metric-label { font-size: 10px; color: #888; margin-bottom: 4px; }
    .metric-value { font-size: 18px; font-weight: 500; }

    .brand-list { display: flex; flex-direction: column; gap: 6px; }

    .brand-card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.08);
      border-radius: 10px;
      overflow: hidden;
    }

    .brand-row {
      display: grid;
      grid-template-columns: 1fr auto 28px;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
    }

    .brand-row:hover { background: #fafaf8; }

    .brand-name { font-size: 13px; font-weight: 500; }
    .brand-meta { font-size: 11px; color: #888; margin-top: 2px; }

    .brand-right { text-align: right; }
    .col-label { font-size: 10px; color: #888; margin-bottom: 2px; }
    .col-value { font-size: 13px; font-weight: 500; }

    .chevron {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      transition: transform 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chevron.open { transform: rotate(180deg); }

    .sku-panel { display: none; border-top: 0.5px solid rgba(0,0,0,0.07); overflow-x: auto; }
    .sku-panel.open { display: block; }

    .sku-table { min-width: 480px; width: 100%; }

    .sku-header {
      display: grid;
      grid-template-columns: minmax(0,1fr) 52px 52px 80px 86px;
      gap: 6px;
      padding: 7px 14px;
      background: #fafaf8;
      border-bottom: 0.5px solid rgba(0,0,0,0.07);
    }

    .sku-header span { font-size: 10px; color: #888; font-weight: 500; }
    .sku-header span.r { text-align: right; }

    .sku-row {
      display: grid;
      grid-template-columns: minmax(0,1fr) 52px 52px 80px 86px;
      gap: 6px;
      padding: 8px 14px;
      align-items: center;
      border-bottom: 0.5px solid rgba(0,0,0,0.05);
    }

    .sku-row:last-child { border-bottom: none; }

    .sku-code { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sku-name { font-size: 10px; color: #888; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .num { font-size: 11px; text-align: right; }
    .num.neg { color: #bbb; }
    .val { font-size: 11px; font-weight: 500; text-align: right; }

    .dot-uae { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #378ADD; margin-right: 3px; vertical-align: middle; }
    .dot-qat { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; margin-right: 3px; vertical-align: middle; }

    @media (min-width: 640px) {
      .container { padding: 24px 32px; }
      header { padding: 16px 32px; }
      header h1 { font-size: 16px; }
      header span { font-size: 12px; }
      .summary-grid { gap: 10px; margin-bottom: 24px; }
      .metric { padding: 14px 16px; }
      .metric-label { font-size: 11px; }
      .metric-value { font-size: 22px; }
      .brand-row { grid-template-columns: 1fr 200px 32px; padding: 12px 16px; }
      .brand-right { text-align: left; }
      .col-label { font-size: 11px; }
      .col-value { font-size: 13px; }
      .sku-table { min-width: unset; }
      .sku-header { grid-template-columns: minmax(0,2fr) 70px 70px 90px 100px; gap: 8px; padding: 7px 16px; }
      .sku-header span { font-size: 11px; }
      .sku-row { grid-template-columns: minmax(0,2fr) 70px 70px 90px 100px; gap: 8px; padding: 8px 16px; }
      .sku-code { font-size: 12px; }
      .sku-name { font-size: 11px; }
      .num { font-size: 12px; }
      .val { font-size: 12px; }
    }
  </style>
</head>
<body>

  <span class="demo-badge">demo</span>
  <span id="last-updated">Last updated: 9 Apr 2026, 08:30</span>

      skus: [
        { code: "SCOR-EXO-R1-M", name: "EXO-R1 Air Carbon Helmet M", uae: 5, qat: 2, cost: 1320, value: 9240 },
        { code: "SCOR-EXO-R1-L", name: "EXO-R1 Air Carbon Helmet L", uae: 4, qat: 1, cost: 1320, value: 6600 },
        { code: "SCOR-EXO-520-M", name: "EXO-520 Evo Air Helmet M", uae: 6, qat: 3, cost: 880, value: 7920 },
        { code: "SCOR-EXO-520-L", name: "EXO-520 Evo Air Helmet L", uae: 3, qat: -1, cost: 880, value: 1760 },
        { code: "SCOR-KPE-CLR", name: "KP-E Pinlock Lens Clear", uae: 12, qat: 5, cost: 95, value: 1615 },
      ]

  ];

  function fmt(val) {
    return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'AED', maximumFractionDigits: 0 }).format(val);
  }

  function fmtNum(val) {
    const n = Math.round(val);
    return (n >= 0 ? '+' : '') + n;
  }

  function render() {
    const sorted = [...brands].sort((a, b) => {
      const aVal = a.skus.reduce((s, i) => s + (i.value || 0), 0);
      const bVal = b.skus.reduce((s, i) => s + (i.value || 0), 0);
      return bVal - aVal;
    });

    const totalValue = sorted.reduce((s, b) => s + b.skus.reduce((ss, i) => ss + (i.value || 0), 0), 0);
    const totalSkus = sorted.reduce((s, b) => s + b.skus.length, 0);

    document.getElementById('total-value').textContent = fmt(totalValue);
    document.getElementById('total-brands').textContent = sorted.length;
    document.getElementById('total-skus').textContent = totalSkus.toLocaleString();

    const list = document.getElementById('brand-list');
    list.innerHTML = '';

    sorted.forEach(brand => {
      const brandValue = brand.skus.reduce((s, i) => s + (i.value || 0), 0);
      const skusSorted = [...brand.skus].sort((a, b) => b.value - a.value);

      const card = document.createElement('div');
      card.className = 'brand-card';

      const row = document.createElement('div');
      row.className = 'brand-row';
      row.innerHTML = `
        <div>
          <div class="brand-name">${brand.brand}</div>
          <div class="brand-meta">${brand.skus.length} SKUs</div>
        </div>
        <div class="brand-right">
          <div class="col-label">Order value</div>
          <div class="col-value">${fmt(brandValue)}</div>
        </div>
        <div class="chevron">&#9660;</div>
      `;

      const panel = document.createElement('div');
      panel.className = 'sku-panel';

      const table = document.createElement('div');
      table.className = 'sku-table';
      table.innerHTML = `
        <div class="sku-header">
          <span>SKU</span>
          <span class="r"><span class="dot-uae"></span>UAE</span>
          <span class="r"><span class="dot-qat"></span>QAT</span>
          <span class="r">Cost</span>
          <span class="r">Value</span>
        </div>
      `;

      skusSorted.forEach(item => {
        const skuRow = document.createElement('div');
        skuRow.className = 'sku-row';
        skuRow.innerHTML = `
          <div>
            <div class="sku-code">${item.code}</div>
            <div class="sku-name">${item.name}</div>
          </div>
          <div class="num ${item.uae < 0 ? 'neg' : ''}">${fmtNum(item.uae)}</div>
          <div class="num ${item.qat < 0 ? 'neg' : ''}">${fmtNum(item.qat)}</div>
          <div class="num">${fmt(item.cost)}</div>
          <div class="val">${fmt(item.value)}</div>
        `;
        table.appendChild(skuRow);
      });

      panel.appendChild(table);

      row.addEventListener('click', () => {
        const chevron = row.querySelector('.chevron');
        const isOpen = panel.classList.contains('open');
        panel.classList.toggle('open', !isOpen);
        chevron.classList.toggle('open', !isOpen);
      });

      card.appendChild(row);
      card.appendChild(panel);
      list.appendChild(card);
    });
  }

  render();
</script>

</html>
